apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "hcloud-cosi-driver.fullname" . }}
  labels:
    {{- include "hcloud-cosi-driver.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "hcloud-cosi-driver.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "hcloud-cosi-driver.fullname" . }}
    namespace: kube-system
